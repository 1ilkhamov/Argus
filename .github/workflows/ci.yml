name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config > /dev/null

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:cli

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --runInBand
        env:
          AUTH_ENABLED: 'false'
          LLM_API_KEY: test-key
      - run: npm run test:e2e -- --runInBand
        env:
          AUTH_ENABLED: 'false'
          LLM_API_KEY: test-key

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  smoke:
    needs: [backend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build

      - name: Start backend
        run: node dist/main &
        env:
          PORT: '2901'
          NODE_ENV: test
          AUTH_ENABLED: 'false'
          LLM_API_KEY: test-key
          LLM_API_BASE: http://localhost:11434/v1
          LLM_PROVIDER: local
          STORAGE_DRIVER: sqlite
          RATE_LIMIT_ENABLED: 'false'

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:2901/api/health > /dev/null 2>&1; then
              echo "Backend is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start within 30s"
          exit 1

      - name: Smoke — public health endpoint
        run: |
          http_status=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:2901/api/health)
          [ "$http_status" = "200" ] || { echo "FAIL: GET /api/health returned $http_status"; exit 1; }
          echo "PASS: GET /api/health -> 200"

      - name: Smoke — stop unauthenticated backend
        run: pkill -f 'node dist/main' || true

      - name: Start backend with auth on
        run: node dist/main &
        env:
          PORT: '2901'
          NODE_ENV: test
          AUTH_ENABLED: 'true'
          AUTH_API_KEYS: smoke-test-key
          LLM_API_KEY: test-key
          LLM_API_BASE: http://localhost:11434/v1
          LLM_PROVIDER: local
          STORAGE_DRIVER: sqlite
          RATE_LIMIT_ENABLED: 'false'

      - name: Wait for auth backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:2901/api/health > /dev/null 2>&1; then
              echo "Backend is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start within 30s"
          exit 1

      - name: Smoke — unauthenticated chat rejected when auth on
        run: |
          http_status=$(curl -sS -o /dev/null -w '%{http_code}' http://localhost:2901/api/chat/conversations 2>/dev/null || true)
          [ "$http_status" = "401" ] || { echo "FAIL: expected 401, got $http_status"; exit 1; }
          echo "PASS: unauthenticated request -> 401"

      - name: Smoke — authenticated chat works with API key
        run: |
          http_status=$(curl -sf -o /dev/null -w '%{http_code}' -H 'X-API-Key: smoke-test-key' http://localhost:2901/api/chat/conversations)
          [ "$http_status" = "200" ] || { echo "FAIL: expected 200, got $http_status"; exit 1; }
          echo "PASS: authenticated request -> 200"

      - name: Smoke — conversations list (auth on)
        run: |
          http_status=$(curl -sf -o /dev/null -w '%{http_code}' -H 'X-API-Key: smoke-test-key' http://localhost:2901/api/chat/conversations)
          [ "$http_status" = "200" ] || { echo "FAIL: GET /api/chat/conversations returned $http_status"; exit 1; }
          echo "PASS: GET /api/chat/conversations -> 200"

      - name: Smoke — create conversation via message (auth on)
        run: |
          response=$(curl -sS -X POST http://localhost:2901/api/chat/messages \
            -H 'Content-Type: application/json' \
            -H 'X-API-Key: smoke-test-key' \
            -d '{"content":"show memory snapshot"}' \
            -w '\n%{http_code}')
          http_status=$(echo "$response" | tail -1)
          [ "$http_status" = "200" ] || { echo "FAIL: POST /api/chat/messages returned $http_status"; echo "$response"; exit 1; }
          echo "PASS: POST /api/chat/messages -> 200"

      - name: Smoke — stop API-key backend
        run: pkill -f 'node dist/main' || true

      - name: Start backend with public sessions
        run: node dist/main &
        env:
          PORT: '2901'
          NODE_ENV: test
          AUTH_ENABLED: 'true'
          AUTH_API_KEYS: ''
          AUTH_PUBLIC_SESSIONS_ENABLED: 'true'
          AUTH_PUBLIC_SESSION_SECRET: smoke-session-secret
          LLM_API_KEY: test-key
          LLM_API_BASE: http://localhost:11434/v1
          LLM_PROVIDER: local
          STORAGE_DRIVER: sqlite
          RATE_LIMIT_ENABLED: 'false'

      - name: Wait for public-session backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:2901/api/health > /dev/null 2>&1; then
              echo "Backend is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start within 30s"
          exit 1

      - name: Smoke — public session chat works without API key
        run: |
          cookie_jar=$(mktemp)
          trap 'rm -f "$cookie_jar"' EXIT
          http_status=$(curl -sS -o /dev/null -w '%{http_code}' -c "$cookie_jar" -b "$cookie_jar" http://localhost:2901/api/chat/conversations)
          [ "$http_status" = "200" ] || { echo "FAIL: expected 200, got $http_status"; exit 1; }
          echo "PASS: public-session chat request -> 200"

      - name: Smoke — public session memory works with same cookie
        run: |
          cookie_jar=$(mktemp)
          trap 'rm -f "$cookie_jar"' EXIT
          bootstrap_status=$(curl -sS -o /dev/null -w '%{http_code}' -c "$cookie_jar" -b "$cookie_jar" http://localhost:2901/api/chat/conversations)
          [ "$bootstrap_status" = "200" ] || { echo "FAIL: expected bootstrap 200, got $bootstrap_status"; exit 1; }
          memory_status=$(curl -sS -o /dev/null -w '%{http_code}' -c "$cookie_jar" -b "$cookie_jar" http://localhost:2901/api/memory/v2/stats)
          [ "$memory_status" = "200" ] || { echo "FAIL: expected memory 200, got $memory_status"; exit 1; }
          echo "PASS: public-session memory request -> 200"
